{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-2 gap-4" style="height: calc(100vh - 8rem)">
  <div class="flex flex-col min-h-0">
    <form hx-post="/search" hx-target="#results" hx-indicator="#spin"
          class="flex gap-2 items-center mb-3">
      <!-- a metro change starts a NEW search: without this, a stale sessionId/priorState
           from the old metro (e.g. a neighborhood-derived bbox) rides into the new
           metro's turn and can zero out every result forever (see ai._drop_foreign_geo
           for the matching server-side guard) -->
      <select name="metro" class="rounded border-slate-300 text-sm py-2"
              onchange="document.getElementById('session_id').value='';
                        document.getElementById('prior_state').value='';">
        {% for key, m in metros.items() %}
        <option value="{{ key }}" {% if key == metro %}selected{% endif %}>{{ m.name }}</option>
        {% endfor %}
      </select>
      <input name="message" required autofocus
             placeholder="retail in Wynwood ~1,500 SF under $8k/mo"
             class="flex-1 rounded border-slate-300 text-sm py-2">
      <input type="hidden" name="session_id" id="session_id" value="">
      <input type="hidden" name="prior_state" id="prior_state" value="">
      {# a drawn rectangle is just a bbox, which the hard filter already understands #}
      <input type="hidden" name="bbox" id="bbox" value="">
      <input type="hidden" name="saved_only" id="saved_only" value="">
      <button class="rounded bg-sky-600 px-4 py-2 text-sm font-medium text-white">Search</button>
      <span id="spin" class="htmx-indicator text-xs text-slate-400">…</span>
    </form>
    <div id="results" class="overflow-y-auto flex-1 pr-1">
      <p class="text-sm text-slate-500">Describe the space you need — plain English.</p>
    </div>
  </div>

  <div class="flex flex-col min-h-0 gap-2">
    <div class="flex items-center gap-2 text-xs">
      <input id="addr" placeholder="Look up an address"
             class="flex-1 rounded border-slate-300 py-1.5 text-xs">
      <button id="addr_go" type="button"
              class="rounded border px-2 py-1.5 text-slate-600 hover:border-sky-400">Go</button>
      <button id="draw" type="button"
              class="rounded border px-2 py-1.5 text-slate-600 hover:border-sky-400">Draw area</button>
      <label class="inline-flex items-center gap-1 text-slate-600">
        <input type="checkbox" id="saved_chk" class="rounded border-slate-300"> Saved only
      </label>
      <span id="area_note" class="hidden text-sky-600"></span>
    </div>
    <div id="map" class="flex-1 rounded-lg border bg-white min-h-0"></div>
  </div>
</div>

<script>
  const CENTER = {{ metros[metro].center | tojson }};
  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: [CENTER[1], CENTER[0]], zoom: 11,
  });
  let markers = [];
  // the results fragment carries the pins as JSON; draw them when HTMX swaps it in
  document.body.addEventListener('htmx:afterSwap', (e) => {
    if (e.target.id !== 'results') return;
    const data = document.getElementById('pins');
    if (!data) return;
    markers.forEach(m => m.remove()); markers = [];
    const pins = JSON.parse(data.textContent);
    document.getElementById('session_id').value = data.dataset.session || '';
    document.getElementById('prior_state').value = data.dataset.must || '';
    const b = new maplibregl.LngLatBounds();
    pins.forEach(p => {
      if (p.lng == null || p.lat == null) return;
      const el = document.createElement('div');
      el.className = 'rounded-full bg-sky-600 text-white text-[10px] px-2 py-1 shadow cursor-pointer';
      el.textContent = p.label;
      el.onclick = () => location.href = '/listings/' + p.id;
      markers.push(new maplibregl.Marker({element: el}).setLngLat([p.lng, p.lat]).addTo(map));
      b.extend([p.lng, p.lat]);
    });
    if (!b.isEmpty()) map.fitBounds(b, {padding: 60, maxZoom: 15});
  });

  // --- Look up an address: geocode through the metro's own free provider, then fly there.
  async function lookup() {
    const q = document.getElementById('addr').value.trim();
    if (!q) return;
    const metro = document.querySelector('[name=metro]').value;
    const r = await fetch('/api/geocode', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({address: q, metro: metro}),
    });
    const d = await r.json();
    if (d.lat == null) {                       // no match is NOT a guess — say so
      document.getElementById('addr').classList.add('border-rose-400');
      return;
    }
    document.getElementById('addr').classList.remove('border-rose-400');
    map.flyTo({center: [d.lng, d.lat], zoom: 16});
    new maplibregl.Marker({color: '#0284c7'}).setLngLat([d.lng, d.lat]).addTo(map);
  }
  document.getElementById('addr_go').onclick = lookup;
  document.getElementById('addr').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); lookup(); }
  });

  // --- Draw area: drag a rectangle. It becomes the bbox the hard SQL filter already takes,
  //     so a drawn area is a real constraint, not a re-ranking.
  let drawing = false, start = null, box = null;
  const note = document.getElementById('area_note');
  document.getElementById('draw').onclick = () => {
    if (document.getElementById('bbox').value) {   // second click clears it
      document.getElementById('bbox').value = '';
      note.classList.add('hidden');
      if (map.getLayer('area')) { map.removeLayer('area'); map.removeSource('area'); }
      return;
    }
    drawing = true;
    map.dragPan.disable();
    map.getCanvas().style.cursor = 'crosshair';
  };
  map.on('mousedown', e => { if (drawing) start = e.lngLat; });
  map.on('mouseup', e => {
    if (!drawing || !start) return;
    const a = start, b2 = e.lngLat;
    drawing = false; start = null;
    map.dragPan.enable();
    map.getCanvas().style.cursor = '';
    const minLng = Math.min(a.lng, b2.lng), maxLng = Math.max(a.lng, b2.lng);
    const minLat = Math.min(a.lat, b2.lat), maxLat = Math.max(a.lat, b2.lat);
    if (maxLng - minLng < 1e-4 || maxLat - minLat < 1e-4) return;   // a click, not a drag
    document.getElementById('bbox').value = [minLat, minLng, maxLat, maxLng].join(',');
    note.textContent = 'area set — click Draw area to clear';
    note.classList.remove('hidden');
    const poly = {type: 'Feature', geometry: {type: 'Polygon', coordinates: [[
      [minLng, minLat], [maxLng, minLat], [maxLng, maxLat], [minLng, maxLat], [minLng, minLat]]]}};
    if (map.getLayer('area')) { map.removeLayer('area'); map.removeSource('area'); }
    map.addSource('area', {type: 'geojson', data: poly});
    map.addLayer({id: 'area', type: 'fill', source: 'area',
                  paint: {'fill-color': '#0284c7', 'fill-opacity': 0.12}});
  });

  document.getElementById('saved_chk').onchange = (e) => {
    document.getElementById('saved_only').value = e.target.checked ? '1' : '';
  };
</script>
{% endblock %}
