    name: Avison Young (LA)
    url: https://www.avisonyoung.us/web/los-angeles/properties-for-lease
    rung: html
    tier: default        # server-rendered
  - key: rexford
    name: Rexford Industrial
    url: https://www.rexfordindustrial.com/properties
