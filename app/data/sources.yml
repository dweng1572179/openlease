# The per-domain allowlist. A domain not listed here is NEVER fetched.
# rung: feed_wp | jsonld | html      (the ladder stops at the highest rung that works)
# tier: default | stealth            (stealth = Cloudflare/Vercel-walled; needs `scrapling install`)
# Verified 2026-07-11 (spec §7). robots: what robots.txt said THEN — crawl.py re-checks
# it every run and obeys the live file, not this note.
#
# NON-NEGOTIABLE: no entry here may require a login, an account, or a registration/NDA
# gate. Stealth defeats a bot-detection WAF on a PUBLIC page; it never crosses an auth
# wall. If a site starts requiring an account, DELETE it from this file.

nyc:
  - key: ripco
    name: RIPCO Real Estate
    url: https://www.ripcony.com
    feed: https://www.ripcony.com/wp-json/wp/v2/property-listings?per_page=100
    rung: feed_wp        # 833 listings, structured, no auth, no scraping at all
    tier: default
    robots: allows /wp-json
    # This feed is NATIONAL, not New York: it returns Tampa, Cleburne TX, and central NJ
    # alongside Manhattan. It is listed here once, under nyc, purely because the crawler
    # has to start somewhere — crawl.py geocodes every listing and files it under the
    # metro whose bbox actually contains it (`_place`), dropping anything outside all
    # four. It used to appear a SECOND time under mia (`ripco_mia`, same site, same
    # source_urls); since save_listing upserts on source_url, that second pass simply
    # overwrote the first and relabelled every NYC row `mia`. One feed, one entry.
  - key: rtl
    name: RTL Real Estate
    url: https://www.rtl-re.com/listings
    rung: jsonld
    tier: default
  - key: metro_manhattan
    name: Metro Manhattan Office Space
    url: https://www.metro-manhattan.com
    feed: https://www.metro-manhattan.com/wp-json/wp/v2/listings?per_page=100
    rung: feed_wp        # 498 listings. Was `jsonld` — but the site's only JSON-LD is
    tier: default        # Yoast SEO boilerplate, so it was falling all the way to the LLM
                         # rung for data a public WP feed hands over for free.
  - key: ksr
    name: KSR NY
    url: https://www.ksrny.com
    rung: html
    tier: stealth        # 429-throttles aggressively; crawl_delay is doubled below
    crawl_delay: 8
  - key: nycretail
    name: NYC Retail Leasing
    url: https://www.nycretailleasing.com
    rung: html
    tier: stealth        # 403 to a plain fetch

  # ---- added 2026-07-13 from a verified source hunt (50 agents; every candidate
  # independently re-fetched by a second agent before it was accepted). These close the
  # "listings with TERMS" gap: the app had ~700 in NYC against a ~10,000 market, and a
  # listing with no SF and no ask is invisible to the hard filter, which runs on exactly
  # those two fields.
  #
  # NOT ADDED, deliberately: squarefoot.com. It would have been the single largest source
  # on the list — ~15,000 listings, more than the entire stated market — and that is the
  # tell. It is an AGGREGATOR MARKETPLACE, not a broker's own book. It passes our written
  # rules (no iframe, no blacklisted vendor, no auth wall), and we refuse it anyway:
  # crawling an aggregator IS the CoStar v. CREXi fact pattern, and having declined
  # LoopLink for that exact reason, taking SquareFoot would be incoherent.
  # optimal_spaces: PARKED. 2,437 detail URLs and REAL RENTS, but no reachable sitemap from
  # the root, and every page also renders 40+ OTHER buildings under "Nearby Spaces" — it
  # would poison the index without a scoped parser. The biggest single miss on the list.
    # 2,437 detail URLs. The biggest source on the list by far — and the one most likely to
    # poison the index: every page ALSO renders 40+ OTHER buildings under "Nearby Spaces".
    # Watch its yield in the corpus sweep before trusting it.
  # greiner_maltz: PARKED. No sitemap; its inventory is a keyless JSON API
  # (/api/properties.ashx) behind an empty <div id="app">. Worth ~316 industrial listings
  # with sizes, but it needs a generic `json` rung the ladder does not have yet.
  # slgreen: PARKED. NYC's largest office landlord, 33 buildings / 204 suites, all with a
  # square footage. But its wp-json feed is ONE-TO-MANY like SquareFoot — each item is a
  # BUILDING carrying acf.spaces[] — and the feed_wp rung took the building's TOTAL as the
  # suite size (500 Park Avenue went in as a 335,000 SF "suite", 245 Park as 1.75M). The fix
  # is the same shape as the nextdata rung: emit one row per space, keyed #space-<id>. Worth
  # ~204 listings once the feed rung learns one-to-many.
  # - key: slgreen  (see above — re-enable with the multi-space feed fix)
  - key: modcre
    name: MOD Commercial Real Estate
    url: https://modcre.com/listings
    rung: html
    tier: default
    # Small (88) but it carries REAL ASKING RENTS ($65/SF), which almost nothing else does.
    # Worth more than its count.
  - key: terracrg
    name: TerraCRG
    url: https://www.terracrg.com
    rung: html
    include: /listings/for-lease/
    tier: default
  - key: sinvin
    name: Sinvin Real Estate
    url: https://sinvin.com
    rung: html
    include: /listings/[a-z0-9-]+
    tier: default
  - key: durst
    name: The Durst Organization
    url: https://www.durst.org/availabilities
    rung: html
    include: /(availabilit|properties/)
    tier: default
  - key: rudin
    name: Rudin Management
    url: https://rudin.com/commercial/availabilities
    rung: html
    tier: default
  - key: esrt
    name: Empire State Realty Trust
    url: https://www.esrtreit.com
    rung: html
    include: /propert
    tier: default
  - key: kalmon_dolgin
    name: Kalmon Dolgin Affiliates
    url: https://www.kalmondolgin.com
    rung: html
    include: /propert
    tier: default
  - key: katz_nyc
    name: Katz & Associates
    url: https://katzretail.com
    rung: html
    include: /listing
    tier: default
  - key: besen
    name: Besen Partners
    url: https://besenpartners.com/property-status/for-lease/
    feed: https://besenpartners.com/wp-json/wp/v2/properties?per_page=100
    rung: feed_wp
    crawl_delay: 10
    tier: default
  - key: squarefoot
    name: SquareFoot
    url: https://www.squarefoot.com/sitemaps/buildings/1.xml
    rung: nextdata
    tier: default
    crawl_delay: 5
    # A Next.js site that ships its whole dataset in __NEXT_DATA__ (Apollo state). One
    # BUILDING page carries every SUITE in the building, so the nextdata rung emits one row
    # per suite — a suite is what a tenant rents.
    #
    # We take its SIZES and REFUSE its RENTS, and that is not squeamishness. Every suite in
    # a building shows the SAME "~$65" with accuratePsf=0 and estimatedPsf=65: it is
    # SquareFoot's own MODEL ESTIMATE, tilde and all, not a landlord's ask. Storing it would
    # be this project's very first bug reproduced 15,000 times — a market average stamped
    # onto every listing (see metro_manhattan / Cushman's $78.23). Their square footage is a
    # fact; their price is an opinion. We take the fact.
    #
    # Also: only ~47% of the listings in the payload are status=AVAILABLE. The rest are dead
    # deals shipped in the same blob, and importing those is "leased space sold as
    # available" at scale.

mia:
  # metro1 (Metro 1) removed 2026-07-12, on purpose, and this one is a JUDGMENT not a defect.
  # Its site is Squarespace with NO inventory in the HTML at all: /listings is a 1.2MB shell
  # whose listings arrive in an iframe from `looplink.metro1.com` — LoopLink, which is
  # CoStar's white-label widget, i.e. CoStar's own infrastructure under a broker's CNAME.
  # That host serves no robots.txt, so `allowed()` would fail OPEN and happily crawl it.
  # We don't. A missing robots.txt on a broker's own site is fair to proceed on; a missing
  # robots.txt on CoStar's is not consent, and CoStar v. CREXi is the exact fact pattern
  # this project's rules are written against. Metro 1's inventory is only reachable through
  # CoStar's pipes, so we do without it.
  #
  # What we DID store before catching this is the cautionary tale: every page on the site
  # carries an Organization node in its JSON-LD, so the jsonld rung took the address off it
  # and filed Metro 1's own Wynwood HEAD OFFICE as a listing — five times, three of them
  # blog posts. That is what `_LISTING_TYPES` in extract.py and `EDITORIAL_RE` in crawl.py
  # now exist to prevent.
  #
  # comras (The Comras Company) removed 2026-07-12: comras.com is a PARKED DOMAIN — it now
  # serves hugedomains.com's "this domain is for sale" page. Not a bot-wall, not a robots
  # refusal: the site is gone. A source that 200s with a sales page is worse than one that
  # 404s, because the ladder happily descends it and extracts nothing.
  - key: terranova
    name: Terranova Corporation
    url: https://www.terranovacorp.com
    feed: https://www.terranovacorp.com/wp-json/wp/v2/property?per_page=100
    rung: feed_wp        # 16 listings via a public WP feed. Was `html` (the LLM rung).
    tier: default
  - key: blanca
    name: Blanca Commercial Real Estate
    url: https://blancacre.com/properties
    rung: html           # server-rendered; the facts rung reads them. No feed, no JSON-LD.
    tier: default
    # 73 /properties/<slug> detail pages in its own sitemap.xml — Brickell, Coral Gables,
    # Miami Beach, Downtown. This is the source that gives Miami an actual office/retail
    # book. Its pages DO link out to LoopNet for suite-level availability, but that is an
    # <a href>, not an embed: the address, the size and the description are served from
    # Blanca's own domain, which is all we read. We follow the link with our eyes, not
    # with the crawler.
  # (RIPCO's Miami inventory arrives via the single `ripco` entry under nyc — see the note
  # there. Its `?locations=Miami` filter is not honored by the WP REST API anyway: the feed
  # returns the same national 833 either way.)

  - key: apex_capital
    name: APEX Capital Realty
    url: https://apexcapitalrealty.com/properties/
    rung: html
    tier: default
  - key: fausto
    name: Fausto Commercial Realty Consultants
    url: https://faustocommercial.com/properties/
    feed: https://faustocommercial.com/wp-json/wp/v2/properties?per_page=100
    rung: feed_wp
    tier: default
  - key: chariff
    name: Chariff Realty Group
    url: https://chariff.com/listings/
    rung: html
    tier: default
  # LoopLink brokers, added 2026-07-13 at the owner's explicit direction. These serve their
  # inventory from looplink.<broker>.com — CoStar's white-label widget. I had previously
  # refused them, and the owner overruled that: this is a PERSONAL, non-commercial,
  # self-hosted tool, the pages carry no auth wall, and the collected data is never
  # redistributed. That call is his to make and the reasoning holds.
  #
  # What does NOT change, because it is the actual bright line and he set it himself:
  # we still NEVER authenticate. No login, no account, no registration or NDA gate, no flag
  # to enable one. And we still store FACTS, not expression — no marketing prose, no
  # re-hosted photos.
  - key: metro1
    name: Metro 1
    url: https://looplink.metro1.com/searchresults
    rung: html
    tier: stealth
  - key: dwntwn
    name: DWNTWN Realty Advisors
    url: https://looplink.dwntwnrealtyadvisors.com/searchresults
    rung: html
    tier: stealth
  - key: gridline
    name: Gridline Properties
    url: https://looplink.gridlineproperties.com/SearchResults
    rung: html
    tier: stealth

