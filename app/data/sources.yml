# The per-domain allowlist. A domain not listed here is NEVER fetched.
# rung: feed_wp | jsonld | html      (the ladder stops at the highest rung that works)
# tier: default | stealth            (stealth = Cloudflare/Vercel-walled; needs `scrapling install`)
# Verified 2026-07-11 (spec §7). robots: what robots.txt said THEN — crawl.py re-checks
# it every run and obeys the live file, not this note.
#
# NON-NEGOTIABLE: no entry here may require a login, an account, or a registration/NDA
# gate. Stealth defeats a bot-detection WAF on a PUBLIC page; it never crosses an auth
# wall. If a site starts requiring an account, DELETE it from this file.

nyc:
  - key: ripco
    name: RIPCO Real Estate
    url: https://www.ripcony.com
    feed: https://www.ripcony.com/wp-json/wp/v2/property-listings?per_page=100
    rung: feed_wp        # 833 listings, structured, no auth, no scraping at all
    tier: default
    robots: allows /wp-json
    # This feed is NATIONAL, not New York: it returns Tampa, Cleburne TX, and central NJ
    # alongside Manhattan. It is listed here once, under nyc, purely because the crawler
    # has to start somewhere — crawl.py geocodes every listing and files it under the
    # metro whose bbox actually contains it (`_place`), dropping anything outside all
    # four. It used to appear a SECOND time under mia (`ripco_mia`, same site, same
    # source_urls); since save_listing upserts on source_url, that second pass simply
    # overwrote the first and relabelled every NYC row `mia`. One feed, one entry.
  - key: rtl
    name: RTL Real Estate
    url: https://www.rtl-re.com/listings
    rung: jsonld
    tier: default
  - key: metro_manhattan
    name: Metro Manhattan Office Space
    url: https://www.metro-manhattan.com
    feed: https://www.metro-manhattan.com/wp-json/wp/v2/listings?per_page=100
    rung: feed_wp        # 498 listings. Was `jsonld` — but the site's only JSON-LD is
    tier: default        # Yoast SEO boilerplate, so it was falling all the way to the LLM
                         # rung for data a public WP feed hands over for free.
  - key: ksr
    name: KSR NY
    url: https://www.ksrny.com
    rung: html
    tier: stealth        # 429-throttles aggressively; crawl_delay is doubled below
    crawl_delay: 8
  - key: nycretail
    name: NYC Retail Leasing
    url: https://www.nycretailleasing.com
    rung: html
    tier: stealth        # 403 to a plain fetch

mia:
  - key: metro1
    name: Metro 1
    url: https://metro1.com/listings
    rung: jsonld
    tier: default
  - key: comras
    name: The Comras Company
    url: https://www.comras.com
    rung: html
    tier: default
  - key: terranova
    name: Terranova Corporation
    url: https://www.terranovacorp.com
    feed: https://www.terranovacorp.com/wp-json/wp/v2/property?per_page=100
    rung: feed_wp        # 16 listings via a public WP feed. Was `html` (the LLM rung).
    tier: default
  # (RIPCO's Miami inventory arrives via the single `ripco` entry under nyc — see the note
  # there. Its `?locations=Miami` filter is not honored by the WP REST API anyway: the feed
  # returns the same national 833 either way.)

la:
